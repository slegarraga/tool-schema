name: Download badge

on:
  schedule:
    - cron: '42 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - run: npm run badges:downloads
      - name: Commit badge update
        run: |
          if git diff --quiet -- badges/npm-downloads; then
            echo "Download badge is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/npm-downloads
          git commit -m "chore: refresh npm download badge"
          git push
